name: Morning Briefing

on:
  schedule:
    - cron: '30 22 * * *'   # 4:00 AM IST = 22:30 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run morning briefing
        id: briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          GIST_TOKEN:         ${{ secrets.GIST_TOKEN }}
          GIST_ID:            ${{ secrets.GIST_ID }}
          GH_USERNAME:    ${{ secrets.GH_USERNAME }}
          REPO_NAME:          morning-briefing
        run: python morning_briefing.py

      - name: Inject Gist URL into Web App
        env:
          GIST_ID:         ${{ secrets.GIST_ID }}
          GH_USERNAME: ${{ secrets.GH_USERNAME }}
        run: |
          GIST_URL="https://gist.githubusercontent.com/${GH_USERNAME}/${GIST_ID}/raw/morning_briefing_archive.json"
          sed -i "s|GIST_RAW_URL_PLACEHOLDER|${GIST_URL}|g" index.html
          echo "✅ Injected Gist URL: $GIST_URL"

      - name: Deploy Web App to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          publish_branch: gh-pages
          keep_files: false
          force_orphan: true
