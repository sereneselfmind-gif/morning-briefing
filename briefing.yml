name: Morning Briefing

on:
  schedule:
    - cron: '30 22 * * *'   # 4:00 AM IST = 22:30 UTC (previous day)
  workflow_dispatch:          # allows manual trigger from GitHub UI anytime

jobs:
  send-briefing:
    runs-on: ubuntu-latest
    timeout-minutes: 10       # kill job if it hangs

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run morning briefing
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python morning_briefing.py
