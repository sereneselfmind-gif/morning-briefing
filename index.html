<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Morning Briefing</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  :root {
    --bg:        var(--tg-theme-bg-color, #0f172a);
    --bg2:       var(--tg-theme-secondary-bg-color, #1e293b);
    --text:      var(--tg-theme-text-color, #f1f5f9);
    --hint:      var(--tg-theme-hint-color, #94a3b8);
    --link:      var(--tg-theme-link-color, #60a5fa);
    --btn:       var(--tg-theme-button-color, #2563eb);
    --btn-text:  var(--tg-theme-button-text-color, #ffffff);
    --accent:    #3b82f6;
    --card-border: rgba(148,163,184,0.12);
    --radius:    12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overscroll-behavior: none;
  }

  /* ── Header ── */
  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--card-border);
    padding: 14px 16px 10px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .header-title {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .header-title span { color: var(--accent); }

  .date-nav {
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg);
    border-radius: 20px;
    padding: 5px 10px;
    border: 1px solid var(--card-border);
  }

  .date-nav button {
    background: none;
    border: none;
    color: var(--hint);
    font-size: 16px;
    cursor: pointer;
    padding: 0 2px;
    line-height: 1;
    transition: color 0.2s;
  }

  .date-nav button:hover { color: var(--text); }
  .date-nav button:disabled { opacity: 0.3; cursor: default; }

  .date-label {
    font-size: 12px;
    color: var(--hint);
    min-width: 110px;
    text-align: center;
    font-weight: 500;
  }

  /* ── Section tabs ── */
  .tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 0 2px;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }

  .tab {
    flex-shrink: 0;
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--hint);
    transition: all 0.2s;
    white-space: nowrap;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── Content area ── */
  .content {
    padding: 12px 12px 80px;
  }

  /* ── Section intro ── */
  .section-intro {
    font-size: 12px;
    color: var(--hint);
    padding: 8px 4px 12px;
    line-height: 1.5;
  }

  /* ── Article cards ── */
  .card {
    background: var(--bg2);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 10px;
    transition: transform 0.15s, border-color 0.15s;
    cursor: pointer;
    text-decoration: none;
    display: block;
    color: inherit;
  }

  .card:hover {
    transform: translateY(-1px);
    border-color: var(--accent);
  }

  .card-num {
    font-size: 11px;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.5px;
    margin-bottom: 5px;
    text-transform: uppercase;
  }

  .card-headline {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 7px;
    color: var(--text);
  }

  .card-summary {
    font-size: 12.5px;
    color: var(--hint);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .card-read {
    font-size: 12px;
    color: var(--accent);
    font-weight: 600;
  }

  .card-arrow {
    font-size: 14px;
    color: var(--accent);
  }

  /* ── Loading / empty states ── */
  .state-center {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    text-align: center;
    gap: 12px;
  }

  .state-icon { font-size: 40px; }

  .state-title {
    font-size: 16px;
    font-weight: 600;
    color: var(--text);
  }

  .state-body {
    font-size: 13px;
    color: var(--hint);
    line-height: 1.5;
    max-width: 260px;
  }

  .spinner {
    width: 32px;
    height: 32px;
    border: 3px solid var(--card-border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Archive strip ── */
  .archive-strip {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 10px 12px 4px;
    scrollbar-width: none;
    border-bottom: 1px solid var(--card-border);
  }
  .archive-strip::-webkit-scrollbar { display: none; }

  .archive-chip {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 14px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    border: 1px solid var(--card-border);
    background: transparent;
    color: var(--hint);
    transition: all 0.2s;
  }

  .archive-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── Footer bar ── */
  .footer-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--card-border);
    padding: 8px 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }

  .footer-bar span {
    font-size: 11px;
    color: var(--hint);
  }

  .footer-dot {
    width: 3px;
    height: 3px;
    border-radius: 50%;
    background: var(--card-border);
  }
</style>
</head>
<body>

<!-- ── Header ─────────────────────────────────────────────────── -->
<div class="header">
  <div class="header-top">
    <div class="header-title">📰 Morning <span>Briefing</span></div>
    <div class="date-nav">
      <button id="btn-prev" onclick="navigate(-1)">‹</button>
      <div class="date-label" id="date-label">Loading...</div>
      <button id="btn-next" onclick="navigate(1)" disabled>›</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
</div>

<!-- ── Archive date strip ───────────────────────────────────────── -->
<div class="archive-strip" id="archive-strip" style="display:none"></div>

<!-- ── Main content ────────────────────────────────────────────── -->
<div class="content" id="content">
  <div class="state-center">
    <div class="spinner"></div>
    <div class="state-title">Loading briefing...</div>
  </div>
</div>

<!-- ── Footer ──────────────────────────────────────────────────── -->
<div class="footer-bar">
  <span>Curated by Groq Llama 3.3 70B</span>
  <div class="footer-dot"></div>
  <span id="footer-date">—</span>
</div>

<script>
// ── Telegram Web App init ─────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
}

// ── Config — injected at build time by GitHub Actions ────────────
// Replace GIST_RAW_URL_PLACEHOLDER with the actual URL in briefing.yml
const GIST_RAW_URL = "GIST_RAW_URL_PLACEHOLDER";

// ── Section metadata ─────────────────────────────────────────────
const SECTIONS = {
  politics:  { emoji: "🌍", label: "Global Politics",  intro: "Geopolitical shifts, diplomacy, conflicts and elections worldwide." },
  india:     { emoji: "🇮🇳", label: "India News",       intro: "Top stories from India — politics, economy, society and Kerala." },
  tech:      { emoji: "💻", label: "Tech News",         intro: "Under-reported developments in AI, open source, hardware and cybersecurity." },
  malayalam: { emoji: "🌴", label: "Malayalam News",    intro: "Today's top stories from Kerala in Malayalam sources." },
};
const SECTION_ORDER = ["politics", "india", "tech", "malayalam"];

// ── State ─────────────────────────────────────────────────────────
let archive       = {};       // full archive from Gist
let sortedDates   = [];       // ["2026-04-22", "2026-04-21", ...]
let currentDateIdx = 0;       // index into sortedDates (0 = latest)
let activeSection = "politics";

// ── Load archive ──────────────────────────────────────────────────
async function loadArchive() {
  try {
    const resp = await fetch(GIST_RAW_URL + "?t=" + Date.now());
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    archive     = await resp.json();
    sortedDates = Object.keys(archive).sort().reverse(); // newest first
    if (sortedDates.length === 0) throw new Error("Empty archive");
    currentDateIdx = 0;
    renderArchiveStrip();
    renderBriefing();
  } catch (e) {
    showError(e.message);
  }
}

// ── Archive date strip ────────────────────────────────────────────
function renderArchiveStrip() {
  const strip = document.getElementById("archive-strip");
  if (sortedDates.length <= 1) { strip.style.display = "none"; return; }
  strip.style.display = "flex";
  strip.innerHTML = sortedDates.map((d, i) => {
    const label = formatShortDate(d);
    return `<button class="archive-chip ${i === currentDateIdx ? 'active' : ''}"
              onclick="jumpToDate(${i})">${label}</button>`;
  }).join("");
}

function formatShortDate(dateKey) {
  const [y, m, d] = dateKey.split("-").map(Number);
  const names = ["Jan","Feb","Mar","Apr","May","Jun",
                 "Jul","Aug","Sep","Oct","Nov","Dec"];
  return `${d} ${names[m-1]}`;
}

function jumpToDate(idx) {
  currentDateIdx = idx;
  renderArchiveStrip();
  renderBriefing();
}

// ── Date navigation ───────────────────────────────────────────────
function navigate(dir) {
  const next = currentDateIdx + dir;
  if (next < 0 || next >= sortedDates.length) return;
  currentDateIdx = next;
  renderArchiveStrip();
  renderBriefing();
}

// ── Render full briefing ──────────────────────────────────────────
function renderBriefing() {
  const dateKey = sortedDates[currentDateIdx];
  const entry   = archive[dateKey];
  if (!entry) { showError("No data for this date"); return; }

  // Update header date
  document.getElementById("date-label").textContent = shortDate(entry.date);
  document.getElementById("footer-date").textContent = entry.date;

  // Nav buttons
  document.getElementById("btn-prev").disabled = (currentDateIdx >= sortedDates.length - 1);
  document.getElementById("btn-next").disabled = (currentDateIdx <= 0);

  // Build tabs
  renderTabs(entry.sections);

  // Render active section content
  renderSection(entry.sections, activeSection);
}

function shortDate(fullDate) {
  // "Wednesday, 22 April 2026" → "22 Apr 2026"
  const parts = fullDate.split(", ");
  if (parts.length > 1) {
    const [d, m, y] = parts[1].split(" ");
    return `${d} ${m.slice(0,3)} ${y}`;
  }
  return fullDate;
}

function renderTabs(sections) {
  document.getElementById("tabs").innerHTML = SECTION_ORDER.map(key => {
    const sec   = SECTIONS[key];
    const items = sections[key] || [];
    if (!items.length) return "";
    return `<button class="tab ${key === activeSection ? 'active' : ''}"
              onclick="switchSection('${key}')">${sec.emoji} ${sec.label}</button>`;
  }).join("");
}

function switchSection(key) {
  activeSection = key;
  const dateKey  = sortedDates[currentDateIdx];
  const sections = archive[dateKey]?.sections || {};
  renderTabs(sections);
  renderSection(sections, key);
}

function renderSection(sections, key) {
  const items = sections[key] || [];
  const sec   = SECTIONS[key] || {};
  const content = document.getElementById("content");

  if (!items.length) {
    content.innerHTML = `
      <div class="state-center">
        <div class="state-icon">${sec.emoji || "📭"}</div>
        <div class="state-title">No stories today</div>
        <div class="state-body">No articles were available for this section on this date.</div>
      </div>`;
    return;
  }

  const cards = items.map((item, i) => `
    <a class="card" href="${escHtml(item.url || '#')}" target="_blank">
      <div class="card-num">Story ${i + 1} of ${items.length}</div>
      <div class="card-headline">${escHtml(item.headline || item.title || "Untitled")}</div>
      ${item.summary ? `<div class="card-summary">${escHtml(item.summary)}</div>` : ""}
      <div class="card-footer">
        <span class="card-read">Read full article</span>
        <span class="card-arrow">→</span>
      </div>
    </a>
  `).join("");

  content.innerHTML = `
    <div class="section-intro">${escHtml(sec.intro || "")}</div>
    ${cards}
  `;
}

// ── Error state ───────────────────────────────────────────────────
function showError(msg) {
  document.getElementById("content").innerHTML = `
    <div class="state-center">
      <div class="state-icon">⚠️</div>
      <div class="state-title">Could not load briefing</div>
      <div class="state-body">${escHtml(msg)}<br/><br/>
        Please check your setup or try again later.</div>
    </div>`;
  document.getElementById("date-label").textContent = "Error";
}

// ── Helpers ───────────────────────────────────────────────────────
function escHtml(str) {
  return String(str || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

// ── Boot ──────────────────────────────────────────────────────────
loadArchive();
</script>
</body>
</html>
